<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ComicVerse — Читалка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bar: #141418;
    --bar-border: rgba(255,255,255,.06);
    --accent: #ff2d55;
    --text: #eee;
    --dim: #666;
    --btn-bg: #1e1e24;
    --btn-active: #2a2a32;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bar);
    border-bottom: 1px solid var(--bar-border);
    flex-shrink: 0;
    z-index: 10;
  }
  .topbar-title {
    flex: 1;
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar-link {
    font-size: 11px;
    font-weight: 700;
    color: var(--dim);
    background: var(--btn-bg);
    padding: 5px 10px;
    border-radius: 6px;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Page display ── */
  .reader-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: #000;
    -webkit-overflow-scrolling: touch;
  }
  .reader-area img {
    width: 100%;
    max-width: 680px;
    display: block;
  }
  .placeholder-page {
    width: 100%;
    max-width: 680px;
    aspect-ratio: 2/3;
    background: linear-gradient(180deg, #111 0%, #1a1a22 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
  }
  .placeholder-page .page-icon { font-size: 56px; opacity:.6; }
  .placeholder-page .page-label { font-size: 14px; font-weight: 700; color: var(--dim); }
  .placeholder-page::before {
    content: '';
    position: absolute;
    inset: 16px;
    border: 2px solid rgba(255,255,255,.04);
    border-radius: 4px;
  }
  .placeholder-page .panels {
    position: absolute; inset: 24px;
    display: grid; gap: 6px; opacity: .07;
  }
  .panels.layout-a { grid-template: 1fr 1fr / 1fr 1fr; }
  .panels.layout-b { grid-template: 2fr 1fr / 1fr; }
  .panels.layout-c { grid-template: 1fr 1fr 1fr / 1fr; }
  .panels.layout-d { grid-template: 1fr 2fr / 1fr 1fr; }
  .panel-cell { border: 2px solid #fff; border-radius: 3px; }

  /* ── Bottom nav ── */
  .bottombar {
    display: flex;
    align-items: center;
    background: var(--bar);
    border-top: 1px solid var(--bar-border);
    flex-shrink: 0;
    z-index: 10;
    padding: 6px 4px;
    padding-bottom: max(6px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 4px;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
    transition: background .15s;
  }
  .nav-btn:active { background: var(--btn-active); }
  .nav-btn:disabled { opacity: .2; pointer-events: none; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .page-counter {
    flex: 1.5;
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    color: var(--dim);
    letter-spacing: .5px;
  }

  /* ── Grid overlay ── */
  .grid-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 50;
    display: none;
    flex-direction: column;
    opacity: 0;
    transition: opacity .2s;
  }
  .grid-overlay.open {
    display: flex;
    opacity: 1;
  }
  .grid-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: var(--bar);
    border-bottom: 1px solid var(--bar-border);
    flex-shrink: 0;
  }
  .grid-header-title {
    flex: 1;
    font-size: 15px;
    font-weight: 800;
  }
  .grid-close {
    background: none;
    border: none;
    color: var(--accent);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
  }
  .grid-close:active { background: var(--btn-active); }
  .grid-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    align-content: start;
    -webkit-overflow-scrolling: touch;
  }
  .grid-thumb {
    aspect-ratio: 2/3;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
    transition: border-color .15s;
    background: #111;
  }
  .grid-thumb.current { border-color: var(--accent); }
  .grid-thumb:active { opacity: .7; }
  .grid-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .grid-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #151520, #111);
    font-size: 24px;
    opacity: .5;
  }
  .grid-thumb-num {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    background: rgba(0,0,0,.7);
    padding: 3px 0;
  }

  /* ── Loading ── */
  .loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--dim);
    font-weight: 700;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--btn-bg);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Image loading ── */
  .page-loading {
    width: 100%;
    max-width: 680px;
    aspect-ratio: 2/3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title" id="comicTitle">Загрузка...</span>
  <a class="topbar-link" id="sourceLink" href="#" target="_blank" style="display:none;">
    Источник ↗
  </a>
</div>

<div class="reader-area" id="readerArea">
  <div class="loading">
    <div class="spinner"></div>
    <span>Загружаем страницы...</span>
  </div>
</div>

<!-- Grid overlay (все страницы) -->
<div class="grid-overlay" id="gridOverlay">
  <div class="grid-header">
    <span class="grid-header-title" id="gridTitle">Страницы</span>
    <button class="grid-close" id="gridClose">Закрыть</button>
  </div>
  <div class="grid-body" id="gridBody"></div>
</div>

<div class="bottombar">
  <button class="nav-btn" id="btnFirst" title="В начало">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><line x1="7" y1="12" x2="18" y2="12"/><line x1="18" y1="6" x2="18" y2="18"/></svg>
  </button>
  <button class="nav-btn" id="btnPrev" title="Назад">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="page-counter" id="pageCounter">— / —</span>
  <button class="nav-btn" id="btnNext" title="Вперёд">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <button class="nav-btn" id="btnLast" title="В конец">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><line x1="17" y1="12" x2="6" y2="12"/><line x1="6" y1="6" x2="6" y2="18"/></svg>
  </button>
  <button class="nav-btn" id="btnGrid" title="Все страницы">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
  </button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  ДАННЫЕ КОМИКСОВ
//
//  Чтобы добавить свой комикс — добавьте его сюда:
//   page_urls: массив ссылок на каждую страницу (JPG/PNG)
//
//  Как найти ссылки на страницы:
//   1. Откройте комикс на сайте-источнике
//   2. ПКМ на странице → "Копировать адрес изображения"
//   3. Вставьте ссылки в массив page_urls
//
//  Или используйте API сайта (см. функцию fetchFromAPI внизу)
// ══════════════════════════════════════════════════════
const COMICS_DATA = {

  // ── Пример с реальными страницами (xkcd — public domain) ──
  1: {
    title: "Solo Leveling",
    pages: 6,
    source_url: null,
    // Замените на реальные URL страниц вашего комикса:
    page_urls: [
      "https://imgs.xkcd.com/comics/barrel_cropped_(1).jpg",
      "https://imgs.xkcd.com/comics/petit_prince.jpg",
      "https://imgs.xkcd.com/comics/island_color.jpg",
      "https://imgs.xkcd.com/comics/landscape_cropped_(1).jpg",
      "https://imgs.xkcd.com/comics/blown_apart.jpg",
      "https://imgs.xkcd.com/comics/irony_color.jpg",
    ],
  },

  2: {
    title: "One Punch Man",
    pages: 5,
    source_url: null,
    page_urls: [
      "https://imgs.xkcd.com/comics/red_spiders_2.jpg",
      "https://imgs.xkcd.com/comics/velociraptors.png",
      "https://imgs.xkcd.com/comics/compiling.png",
      "https://imgs.xkcd.com/comics/python.png",
      "https://imgs.xkcd.com/comics/sandwich.png",
    ],
  },

  3: {
    title: "Chainsaw Man",
    pages: 4,
    source_url: null,
    page_urls: [
      "https://imgs.xkcd.com/comics/duty_calls.png",
      "https://imgs.xkcd.com/comics/exploits_of_a_mom.png",
      "https://imgs.xkcd.com/comics/goto.png",
      "https://imgs.xkcd.com/comics/standards.png",
    ],
  },

  4: {
    title: "Берсерк",
    pages: 5,
    source_url: null,
    page_urls: [
      "https://imgs.xkcd.com/comics/useless.jpg",
      "https://imgs.xkcd.com/comics/a_bunch_of_rocks.png",
      "https://imgs.xkcd.com/comics/angular_momentum.jpg",
      "https://imgs.xkcd.com/comics/nerd_sniping.png",
      "https://imgs.xkcd.com/comics/purity.png",
    ],
  },

  5: {
    title: "Магическая Битва",
    pages: 4,
    source_url: null,
    page_urls: [
      "https://imgs.xkcd.com/comics/convincing.png",
      "https://imgs.xkcd.com/comics/machine_learning_2x.png",
      "https://imgs.xkcd.com/comics/is_it_worth_the_time_2x.png",
      "https://imgs.xkcd.com/comics/password_strength.png",
    ],
  },

};


// ══════════════════════════════════════════════════════
//  Пример: загрузка с API сайта (раскомментируйте)
// ══════════════════════════════════════════════════════
//
// async function fetchFromAPI(comicId) {
//   const resp = await fetch(`https://your-manga-api.com/comic/${comicId}/pages`);
//   const data = await resp.json();
//   return {
//     title: data.title,
//     pages: data.pages.length,
//     page_urls: data.pages.map(p => p.image_url),
//     source_url: data.url,
//   };
// }


// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let comic = null;
let currentPage = 0;
let totalPages = 0;
let gridOpen = false;

// DOM
const readerArea   = document.getElementById('readerArea');
const comicTitle   = document.getElementById('comicTitle');
const sourceLink   = document.getElementById('sourceLink');
const pageCounter  = document.getElementById('pageCounter');
const btnFirst     = document.getElementById('btnFirst');
const btnPrev      = document.getElementById('btnPrev');
const btnNext      = document.getElementById('btnNext');
const btnLast      = document.getElementById('btnLast');
const btnGrid      = document.getElementById('btnGrid');
const gridOverlay  = document.getElementById('gridOverlay');
const gridBody     = document.getElementById('gridBody');
const gridTitle    = document.getElementById('gridTitle');
const gridClose    = document.getElementById('gridClose');


// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
(async function init() {
  // Telegram WebApp
  if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor('#141418');
    tg.setBackgroundColor('#0a0a0a');
  }

  // Get comic ID
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));

  // Попытка загрузить из локальных данных
  comic = COMICS_DATA[id];

  // Или из API (раскомментируйте):
  // if (!comic) comic = await fetchFromAPI(id);

  if (!comic) {
    readerArea.innerHTML = `
      <div class="loading">
        <span style="font-size:48px;">😕</span>
        <span>Комикс не найден</span>
      </div>`;
    return;
  }

  comicTitle.textContent = comic.title;
  totalPages = comic.pages;

  if (comic.source_url) {
    sourceLink.href = comic.source_url;
    sourceLink.style.display = '';
  }

  currentPage = 0;
  renderPage();

  // Navigation
  btnFirst.addEventListener('click', () => goTo(0));
  btnPrev.addEventListener('click',  () => goTo(currentPage - 1));
  btnNext.addEventListener('click',  () => goTo(currentPage + 1));
  btnLast.addEventListener('click',  () => goTo(totalPages - 1));

  // Grid button
  btnGrid.addEventListener('click', toggleGrid);
  gridClose.addEventListener('click', toggleGrid);

  // Swipe
  let startX = 0, startY = 0;
  readerArea.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  });
  readerArea.addEventListener('touchend', e => {
    const dx = startX - e.changedTouches[0].clientX;
    const dy = Math.abs(startY - e.changedTouches[0].clientY);
    if (Math.abs(dx) > 50 && dy < 80) {
      goTo(currentPage + (dx > 0 ? 1 : -1));
    }
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (gridOpen) {
      if (e.key === 'Escape') toggleGrid();
      return;
    }
    if (e.key === 'ArrowLeft')  goTo(currentPage - 1);
    if (e.key === 'ArrowRight') goTo(currentPage + 1);
    if (e.key === 'Home')       goTo(0);
    if (e.key === 'End')        goTo(totalPages - 1);
    if (e.key === 'g')          toggleGrid();
  });
})();


// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function goTo(page) {
  if (page < 0 || page >= totalPages) return;
  currentPage = page;
  renderPage();
}

function renderPage() {
  pageCounter.textContent = `${currentPage + 1} / ${totalPages}`;
  btnFirst.disabled = btnPrev.disabled = currentPage === 0;
  btnNext.disabled = btnLast.disabled = currentPage === totalPages - 1;

  const url = comic.page_urls?.[currentPage];

  if (url) {
    // Show loading → then image
    readerArea.innerHTML = `<div class="page-loading"><div class="spinner"></div></div>`;
    const img = new Image();
    img.onload = () => {
      readerArea.innerHTML = '';
      img.style.cssText = 'width:100%;max-width:680px;display:block;';
      readerArea.appendChild(img);
    };
    img.onerror = () => {
      readerArea.innerHTML = `
        <div class="loading">
          <span style="font-size:36px;">⚠️</span>
          <span>Не удалось загрузить страницу</span>
        </div>`;
    };
    img.src = url;
    img.alt = `Стр. ${currentPage + 1}`;
  } else {
    // Placeholder
    const layouts = ['layout-a', 'layout-b', 'layout-c', 'layout-d'];
    const layout = layouts[currentPage % layouts.length];
    const n = layout === 'layout-b' ? 2 : layout === 'layout-c' ? 3 : 4;
    const cells = Array.from({length: n}, () => '<div class="panel-cell"></div>').join('');
    const icons = ['💥','⚡','🔥','💫','🗡','👊','🌀','✨'];

    readerArea.innerHTML = `
      <div class="placeholder-page">
        <div class="panels ${layout}">${cells}</div>
        <div class="page-icon">${icons[currentPage % icons.length]}</div>
        <div class="page-label">${comic.title} — Стр. ${currentPage + 1}</div>
      </div>`;
  }
  readerArea.scrollTop = 0;
}


// ══════════════════════════════════════════════════════
//  GRID VIEW (сетка всех страниц)
// ══════════════════════════════════════════════════════
function toggleGrid() {
  gridOpen = !gridOpen;
  if (gridOpen) {
    renderGrid();
    gridOverlay.classList.add('open');
    btnGrid.classList.add('active');
  } else {
    gridOverlay.classList.remove('open');
    btnGrid.classList.remove('active');
  }
}

function renderGrid() {
  gridTitle.textContent = `${comic.title} — ${totalPages} стр.`;
  const icons = ['💥','⚡','🔥','💫','🗡','👊','🌀','✨'];

  gridBody.innerHTML = Array.from({length: totalPages}, (_, i) => {
    const url = comic.page_urls?.[i];
    const isCurrent = i === currentPage ? ' current' : '';
    const inner = url
      ? `<img src="${url}" loading="lazy" alt="Стр. ${i+1}">`
      : `<div class="grid-thumb-placeholder">${icons[i % icons.length]}</div>`;

    return `
      <div class="grid-thumb${isCurrent}" data-page="${i}">
        ${inner}
        <div class="grid-thumb-num">${i + 1}</div>
      </div>`;
  }).join('');

  // Click handler
  gridBody.querySelectorAll('.grid-thumb').forEach(el => {
    el.addEventListener('click', () => {
      const p = parseInt(el.dataset.page);
      goTo(p);
      toggleGrid();
    });
  });

  // Scroll to current
  requestAnimationFrame(() => {
    const cur = gridBody.querySelector('.current');
    if (cur) cur.scrollIntoView({ block: 'center', behavior: 'instant' });
  });
}
</script>
</body>
</html>
