<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ComicVerse — Читалка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --surface: #1a1a1f;
    --surface-light: #222228;
    --accent: #ff2d55;
    --text: #eee;
    --dim: #666;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Top bar ── */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(10,10,12,.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,.06);
    z-index: 100;
    transition: transform .3s;
  }
  .topbar.hidden { transform: translateY(-100%); }
  .topbar-title {
    flex: 1;
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar-vpn {
    font-size: 11px;
    font-weight: 700;
    color: var(--dim);
    background: var(--surface);
    padding: 5px 10px;
    border-radius: 6px;
    text-decoration: none;
    white-space: nowrap;
  }

  /* ── Reader area — continuous vertical scroll ── */
  .reader {
    padding-top: 48px;   /* topbar height */
    padding-bottom: 80px; /* nav height */
  }
  .reader img {
    width: 100%;
    display: block;
    /* No gaps between pages — seamless vertical scroll */
  }
  .page-divider {
    height: 2px;
    background: rgba(255,255,255,.03);
  }

  /* ── Placeholder page ── */
  .placeholder-page {
    width: 100%;
    aspect-ratio: 2/3;
    background: linear-gradient(180deg, #0d0d12 0%, #141420 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    border-bottom: 1px solid rgba(255,255,255,.03);
  }
  .placeholder-page .ph-icon { font-size: 48px; opacity:.4; }
  .placeholder-page .ph-label {
    font-size: 13px; font-weight: 700; color: rgba(255,255,255,.2);
  }

  /* ── Bottom nav — separate floating buttons ── */
  .bottomnav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,.95) 60%, transparent);
    z-index: 100;
    transition: transform .3s;
  }
  .bottomnav.hidden { transform: translateY(100%); }

  .nav-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
  }
  .nav-btn:active {
    transform: scale(.92);
    background: var(--surface-light);
  }
  .nav-btn:disabled {
    opacity: .25;
    pointer-events: none;
  }
  .nav-btn.accent {
    background: var(--accent);
    border-color: var(--accent);
  }
  .nav-btn svg { width: 20px; height: 20px; }

  .page-pill {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 44px;
    padding: 0 16px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    font-size: 13px;
    font-weight: 800;
    color: var(--dim);
    letter-spacing: .5px;
    white-space: nowrap;
  }

  /* ── Grid overlay ── */
  .grid-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.97);
    z-index: 200;
    display: none;
    flex-direction: column;
  }
  .grid-overlay.open { display: flex; }
  .grid-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .grid-header-title {
    flex: 1; font-size: 15px; font-weight: 800;
  }
  .grid-close {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px;
    color: var(--accent);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    padding: 8px 16px;
  }
  .grid-close:active { opacity: .7; }
  .grid-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    align-content: start;
    -webkit-overflow-scrolling: touch;
  }
  .grid-thumb {
    aspect-ratio: 2/3;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
    background: #111;
  }
  .grid-thumb.current { border-color: var(--accent); }
  .grid-thumb:active { opacity: .7; }
  .grid-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .grid-thumb-ph {
    width:100%; height:100%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #151520, #111);
    font-size: 22px; opacity:.4;
  }
  .grid-thumb-num {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    text-align: center;
    font-size: 11px; font-weight: 800;
    color: #fff;
    background: rgba(0,0,0,.7);
    padding: 3px 0;
  }

  /* ── Loading states ── */
  .initial-loading {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--dim);
    font-weight: 700;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--surface);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .img-loading {
    width: 100%;
    aspect-ratio: 2/3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0e;
  }

  /* ── Scroll progress bar ── */
  .progress-bar {
    position: fixed;
    top: 47px; left: 0;
    height: 2px;
    background: var(--accent);
    z-index: 101;
    transition: width .1s linear;
    box-shadow: 0 0 8px rgba(255,45,85,.5);
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar" id="topbar">
  <span class="topbar-title" id="comicTitle">Загрузка...</span>
  <a class="topbar-vpn" id="sourceLink" href="#" target="_blank" style="display:none;">
    Источник ↗
  </a>
</div>
<div class="progress-bar" id="progressBar" style="width:0%"></div>

<!-- Reader (vertical scroll) -->
<div class="reader" id="reader">
  <div class="initial-loading">
    <div class="spinner"></div>
    <span>Загружаем комикс...</span>
  </div>
</div>

<!-- Grid overlay -->
<div class="grid-overlay" id="gridOverlay">
  <div class="grid-header">
    <span class="grid-header-title" id="gridTitle">Страницы</span>
    <button class="grid-close" id="gridClose">Закрыть</button>
  </div>
  <div class="grid-body" id="gridBody"></div>
</div>

<!-- Bottom nav — separate buttons -->
<div class="bottomnav" id="bottomnav">
  <button class="nav-btn" id="btnUp" title="Наверх">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <button class="nav-btn" id="btnPrev" title="Пред. страница">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="6" x2="5" y2="18"/><polyline points="17 18 9 12 17 6"/></svg>
  </button>
  <button class="nav-btn" id="btnPrevPage" title="Назад">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="page-pill" id="pagePill">— / —</span>
  <button class="nav-btn" id="btnNextPage" title="Вперёд">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
  </button>
  <button class="nav-btn" id="btnLast" title="В конец">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 6 15 12 7 18"/><line x1="19" y1="6" x2="19" y2="18"/></svg>
  </button>
  <button class="nav-btn" id="btnGrid" title="Все страницы">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
  </button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  ДАННЫЕ КОМИКСОВ
//
//  Как добавить комикс:
//   1. Откройте комикс на вашем сайте-источнике
//   2. ПКМ на картинке страницы → «Копировать адрес изображения»
//   3. Вставьте URL в массив page_urls ниже
//
//  Или подключите API (пример внизу файла)
// ══════════════════════════════════════════════════════
const COMICS_DATA = {

  // ── Thor Vol. 3 ──
  // Замените page_urls на реальные ссылки со страниц вашего сайта
  1: {
    title: "Thor Vol. 3",
    source_url: null,
    page_urls: [
      // Вставьте сюда 6 ссылок на страницы комикса, например:
      // "https://your-cdn.com/thor-v3/001.jpg",
      // "https://your-cdn.com/thor-v3/002.jpg",
      // ...
    ],
  },

  // ── Daredevil Vol. 1 ──
  2: {
    title: "Daredevil Vol. 1",
    source_url: null,
    page_urls: [
      // "https://your-cdn.com/daredevil-v1/001.jpg",
      // ...
    ],
  },

  // ── Алтимейт Человек-Паук Том 1 ──
  3: {
    title: "Алтимейт Человек-Паук Том 1",
    source_url: null,
    page_urls: [
      "https://img.com-x.life/comix/2170/612686/1734295611_0.92193100.jpg",
      "https://img.com-x.life/comix/2170/612686/1734295612_0.76221400.jpg",
      "https://img.com-x.life/comix/2170/612686/1734295613_0.58892900.jpg",
      "https://img.com-x.life/comix/2170/612686/1734295615_0.18845100.jpg",
      "https://img.com-x.life/comix/2170/612686/1734295616_0.01518800.jpg",
      "https://img.com-x.life/comix/2170/612686/1734295616_0.87902600.jpg",
    ],
  },

  // ── Solo Leveling ──
  4: {
    title: "Solo Leveling",
    source_url: null,
    page_urls: [],
  },

  // ── One Punch Man ──
  5: {
    title: "One Punch Man",
    source_url: null,
    page_urls: [],
  },
};

// Кол-во заглушечных страниц если page_urls пуст
const FALLBACK_PAGES = 6;


// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let comic = null;
let totalPages = 0;
let currentVisiblePage = 0;
let gridOpen = false;
let barsVisible = true;

const reader      = document.getElementById('reader');
const comicTitle   = document.getElementById('comicTitle');
const sourceLink   = document.getElementById('sourceLink');
const pagePill     = document.getElementById('pagePill');
const progressBar  = document.getElementById('progressBar');
const topbar       = document.getElementById('topbar');
const bottomnav    = document.getElementById('bottomnav');
const gridOverlay  = document.getElementById('gridOverlay');
const gridBody     = document.getElementById('gridBody');
const gridTitle    = document.getElementById('gridTitle');


// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
(function init() {
  if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    try {
      tg.setHeaderColor('#0a0a0c');
      tg.setBackgroundColor('#000000');
    } catch(e) {}
  }

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  comic = COMICS_DATA[id];

  if (!comic) {
    reader.innerHTML = `
      <div class="initial-loading">
        <span style="font-size:48px;">😕</span>
        <span>Комикс не найден</span>
      </div>`;
    return;
  }

  comicTitle.textContent = comic.title;
  totalPages = comic.page_urls.length > 0 ? comic.page_urls.length : FALLBACK_PAGES;

  if (comic.source_url) {
    sourceLink.href = comic.source_url;
    sourceLink.style.display = '';
  }

  renderAllPages();
  setupNav();
  setupScroll();
})();


// ══════════════════════════════════════════════════════
//  RENDER ALL PAGES (vertical scroll)
// ══════════════════════════════════════════════════════
function renderAllPages() {
  const icons = ['💥','⚡','🔥','💫','🗡','👊','🌀','✨'];
  let html = '';

  for (let i = 0; i < totalPages; i++) {
    const url = comic.page_urls[i];
    if (url) {
      html += `<img
        data-page="${i}"
        src="${url}"
        alt="Стр. ${i+1}"
        loading="${i < 3 ? 'eager' : 'lazy'}"
        onerror="this.outerHTML='<div class=placeholder-page data-page=${i}><div class=ph-icon>⚠️</div><div class=ph-label>Ошибка загрузки стр. ${i+1}</div></div>'"
      >`;
    } else {
      html += `
        <div class="placeholder-page" data-page="${i}">
          <div class="ph-icon">${icons[i % icons.length]}</div>
          <div class="ph-label">${comic.title} — Стр. ${i+1}</div>
        </div>`;
    }
  }

  reader.innerHTML = html;
  updatePageInfo(0);
}


// ══════════════════════════════════════════════════════
//  SCROLL TRACKING
// ══════════════════════════════════════════════════════
function setupScroll() {
  let ticking = false;

  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        onScroll();
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
}

function onScroll() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  progressBar.style.width = progress + '%';

  // Determine which page is most visible
  const pages = reader.querySelectorAll('[data-page]');
  const viewMid = scrollTop + window.innerHeight * 0.4;

  let closestPage = 0;
  let closestDist = Infinity;

  pages.forEach(el => {
    const rect = el.getBoundingClientRect();
    const elMid = scrollTop + rect.top + rect.height / 2;
    const dist = Math.abs(elMid - viewMid);
    if (dist < closestDist) {
      closestDist = dist;
      closestPage = parseInt(el.dataset.page);
    }
  });

  if (closestPage !== currentVisiblePage) {
    currentVisiblePage = closestPage;
    updatePageInfo(closestPage);
  }
}

function updatePageInfo(page) {
  pagePill.textContent = `${page + 1} / ${totalPages}`;

  document.getElementById('btnUp').disabled = page === 0;
  document.getElementById('btnPrev').disabled = page === 0;
  document.getElementById('btnPrevPage').disabled = page === 0;
  document.getElementById('btnNextPage').disabled = page === totalPages - 1;
  document.getElementById('btnLast').disabled = page === totalPages - 1;
}


// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function setupNav() {
  document.getElementById('btnUp').addEventListener('click', () => scrollToPage(0));
  document.getElementById('btnPrev').addEventListener('click', () => scrollToPage(0));
  document.getElementById('btnPrevPage').addEventListener('click', () => scrollToPage(currentVisiblePage - 1));
  document.getElementById('btnNextPage').addEventListener('click', () => scrollToPage(currentVisiblePage + 1));
  document.getElementById('btnLast').addEventListener('click', () => scrollToPage(totalPages - 1));
  document.getElementById('btnGrid').addEventListener('click', toggleGrid);
  document.getElementById('gridClose').addEventListener('click', toggleGrid);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (gridOpen) {
      if (e.key === 'Escape') toggleGrid();
      return;
    }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp')   scrollToPage(currentVisiblePage - 1);
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') scrollToPage(currentVisiblePage + 1);
    if (e.key === 'Home') scrollToPage(0);
    if (e.key === 'End')  scrollToPage(totalPages - 1);
    if (e.key === 'g')    toggleGrid();
  });
}

function scrollToPage(idx) {
  if (idx < 0 || idx >= totalPages) return;
  const el = reader.querySelector(`[data-page="${idx}"]`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}


// ══════════════════════════════════════════════════════
//  GRID VIEW
// ══════════════════════════════════════════════════════
function toggleGrid() {
  gridOpen = !gridOpen;
  if (gridOpen) {
    renderGrid();
    gridOverlay.classList.add('open');
  } else {
    gridOverlay.classList.remove('open');
  }
}

function renderGrid() {
  gridTitle.textContent = `${comic.title} — ${totalPages} стр.`;
  const icons = ['💥','⚡','🔥','💫','🗡','👊','🌀','✨'];

  gridBody.innerHTML = Array.from({length: totalPages}, (_, i) => {
    const url = comic.page_urls[i];
    const isCurrent = i === currentVisiblePage ? ' current' : '';
    const inner = url
      ? `<img src="${url}" loading="lazy">`
      : `<div class="grid-thumb-ph">${icons[i % icons.length]}</div>`;

    return `
      <div class="grid-thumb${isCurrent}" data-gpage="${i}">
        ${inner}
        <div class="grid-thumb-num">${i + 1}</div>
      </div>`;
  }).join('');

  gridBody.querySelectorAll('.grid-thumb').forEach(el => {
    el.addEventListener('click', () => {
      scrollToPage(parseInt(el.dataset.gpage));
      toggleGrid();
    });
  });

  requestAnimationFrame(() => {
    const cur = gridBody.querySelector('.current');
    if (cur) cur.scrollIntoView({ block: 'center', behavior: 'instant' });
  });
}

</script>
</body>
</html>
